<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AI PDF Analyzer</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#0f0f0f;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        body::before{
            content:"";
            position:absolute;
            width:500px;
            height:500px;
            background:#007BFF;
            filter:blur(180px);
            opacity:.18;
            top:-150px;
            left:-120px;
        }

        body::after{
            content:"";
            position:absolute;
            width:450px;
            height:450px;
            background:#00d4ff;
            filter:blur(180px);
            opacity:.10;
            bottom:-150px;
            right:-120px;
        }

        .container{

            width:650px;
            background:rgba(25,25,25,.95);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.08);
            border-radius:20px;
            padding:45px;
            box-shadow:0 0 35px rgba(0,0,0,.7);
            z-index:1;
        }

        h1{
            text-align:center;
            color:#3ea6ff;
            margin-bottom:10px;
            font-size:38px;
        }

        p{
            text-align:center;
            color:#bbbbbb;
            margin-bottom:35px;
            line-height:1.6;
        }

        label{

            display:block;
            margin-bottom:10px;
            font-size:17px;
            color:#ddd;

        }

        input{

            width:100%;
            padding:16px;
            background:#151515;
            color:white;
            border:1px solid #333;
            border-radius:12px;
            font-size:15px;
            margin-bottom:30px;

        }

        input:focus{

            outline:none;
            border:1px solid #3ea6ff;
            box-shadow:0 0 10px #3ea6ff55;

        }

        button{

            width:100%;
            padding:16px;
            border:none;
            border-radius:12px;
            background:#1e88ff;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:.3s;

        }

        button:hover{

            background:#3ea6ff;
            transform:translateY(-3px);
            box-shadow:0 8px 20px rgba(62,166,255,.35);

        }

        .footer{

            margin-top:30px;
            text-align:center;
            color:#777;
            font-size:14px;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>AI PDF Analyzer</h1>

    <p>
        Analyze Research Papers using Artificial Intelligence.
        Extract document type, title, authors, summary and key insights instantly.
    </p>

    <form action="/analyze" method="post">

        <label>PDF URL</label>

        <input
                type="text"
                name="pdfUrl"
                placeholder="Paste PDF URL here..."
                required>

        <button type="submit">
            Analyze PDF
        </button>

    </form>

    <div class="footer">

        Spring Boot • Thymeleaf • MySQL • OpenRouter AI

    </div>

</div>

</body>
</html>
