<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Analysis Result</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
        }

        body{

        background:#0d0d0d;
        color:white;
        padding:50px;

        }

        body::before{

        content:"";
        position:fixed;
        width:450px;
        height:450px;
        background:#1e88ff;
        filter:blur(180px);
        opacity:.15;
        top:-150px;
        left:-150px;

        }

        .container{

        max-width:1100px;
        margin:auto;
        background:#171717;
        padding:40px;
        border-radius:20px;
        box-shadow:0 0 35px rgba(0,0,0,.7);

        }

        h1{

        text-align:center;
        margin-bottom:35px;
        color:#3ea6ff;
        font-size:42px;

        }

        .card{

        background:#222;
        padding:22px;
        margin-bottom:20px;
        border-radius:14px;
        border-left:5px solid #1e88ff;
        transition:.3s;

        }

        .card:hover{

        transform:translateX(6px);
        background:#262626;

        }

        .label{

        color:#3ea6ff;
        font-weight:bold;
        font-size:18px;
        margin-bottom:10px;

        }

        .value{

        color:#ddd;
        font-size:18px;
        line-height:1.7;

        }

        .summary{

        white-space:pre-wrap;
        text-align:justify;

        }

        a{

        display:block;
        width:240px;
        margin:40px auto 0;
        text-align:center;
        padding:15px;
        background:#1e88ff;
        color:white;
        text-decoration:none;
        border-radius:10px;
        transition:.3s;

        }

        a:hover{

        background:#3ea6ff;
        transform:translateY(-3px);

        }

    </style>

</head>

<body>

<div class="container">

    <h1>Analysis Result</h1>

    <div class="card">
        <div class="label">Document Type</div>
        <div class="value" th:text="${analysis.documentType}"></div>
    </div>

    <div class="card">
        <div class="label">Title</div>
        <div class="value" th:text="${analysis.title}"></div>
    </div>

    <div class="card">
        <div class="label">Authors</div>
        <div class="value" th:text="${analysis.authors}"></div>
    </div>

    <div class="card">
        <div class="label">Summary</div>
        <div class="value summary" th:text="${analysis.summary}"></div>
    </div>

    <div class="card">
        <div class="label">Key Takeaway</div>
        <div class="value summary" th:text="${analysis.keyTakeaway}"></div>
    </div>

    <a href="/">Analyze Another PDF</a>

</div>

</body>

</html>
